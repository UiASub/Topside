{% extends "base.html" %}

{% block title %}Pilot - UiASub Topside{% endblock %}

{% block content %}
<div class="pilot-container">
  <div class="pilot-feed fit-cover" id="pilot-feed-shell">
    <img id="pilot-camera" src="/ip_video_feed" alt="ROV camera feed" draggable="false">
    <div class="pilot-feed-vignette" aria-hidden="true"></div>
    <div class="pilot-feed-status" id="pilot-feed-status">
      <span class="pilot-feed-dot" id="pilot-feed-dot"></span>
      <span id="pilot-feed-state">CONNECTING...</span>
      <button type="button" id="pilot-reconnect" class="pilot-feed-btn">Reconnect</button>
      <button type="button" id="pilot-fit" class="pilot-feed-btn">Fit</button>
    </div>
  </div>

  <div class="hud-overlay">
    <div class="hud-top">
      <div class="hud-panel hud-depth">
        <span class="hud-label">DEPTH</span>
        <div class="hud-big-value">
          <span id="hud-depth">--.-</span><span class="hud-unit">m</span>
        </div>
        <div class="hud-sub">
          TGT <span id="hud-depth-target">--.-</span>m
        </div>
      </div>
    </div>

    <div class="hud-left"></div>

    <div class="hud-right">
      <div class="hud-panel hud-aruco-panel">
        <div class="hud-panel-head">
          <span class="hud-label">ARUCO</span>
          <span class="hud-mode-pill" id="hud-aruco-state">OFF</span>
        </div>
        <div class="hud-aruco-actions">
          <button type="button" id="hud-aruco-toggle" class="pilot-feed-btn">Start</button>
          <button type="button" id="hud-aruco-clear" class="pilot-feed-btn">Clear</button>
        </div>
        <div class="hud-label-sm">VISIBLE</div>
        <div class="hud-mono hud-aruco-visible" id="hud-aruco-visible">--</div>
        <div class="hud-label-sm hud-aruco-log-label">ORDER</div>
        <ol class="hud-aruco-log" id="hud-aruco-log"></ol>
      </div>
    </div>

    <div class="hud-crosshair">
      <svg viewBox="0 0 100 100" width="70" height="70">
        <circle cx="50" cy="50" r="22" stroke="rgba(0,222,255,0.35)" stroke-width="1" fill="none"/>
        <circle cx="50" cy="50" r="2" fill="rgba(0,222,255,0.6)"/>
        <line x1="10" y1="50" x2="38" y2="50" stroke="rgba(0,222,255,0.5)" stroke-width="1.5"/>
        <line x1="62" y1="50" x2="90" y2="50" stroke="rgba(0,222,255,0.5)" stroke-width="1.5"/>
        <line x1="50" y1="10" x2="50" y2="38" stroke="rgba(0,222,255,0.5)" stroke-width="1.5"/>
        <line x1="50" y1="62" x2="50" y2="90" stroke="rgba(0,222,255,0.5)" stroke-width="1.5"/>
      </svg>
    </div>

    <div class="hud-bottom">
      <div class="hud-panel hud-lights-panel">
        <span class="hud-label">LIGHTS</span>
        <div class="hud-telem-item">
          <span class="hud-label-sm">LEVEL</span>
          <span class="hud-mono" id="hud-lights">--</span>
        </div>
        <input type="range" class="form-range hud-light-slider" id="hud-light-slider" min="0" max="80" step="1" value="0">
      </div>

      <div class="hud-panel hud-manipulator-panel">
        <span class="hud-label">MANIPULATOR</span>
        <div class="hud-manipulator-readout">
          <div class="hud-telem-item">
            <span class="hud-label-sm">TARGET</span>
            <span class="hud-mono" id="hud-manipulator-target">0 deg</span>
          </div>
          <div class="hud-telem-item">
            <span class="hud-label-sm">APPLIED</span>
            <span class="hud-mono" id="hud-manipulator-applied">--</span>
          </div>
          <div class="hud-telem-item">
            <span class="hud-label-sm">PULSE</span>
            <span class="hud-mono" id="hud-manipulator-pulse">--</span>
          </div>
        </div>
        <input type="range" class="form-range hud-manipulator-slider" id="hud-manipulator-slider" min="-50" max="50" step="1" value="0">
      </div>

      <div class="hud-panel hud-status-panel">
        <div class="hud-status-row">
          <span class="hud-status-dot" id="hud-rpi-dot"></span>
          <span class="hud-label-sm">CAM</span>
        </div>
        <div class="hud-status-row">
          <span class="hud-status-dot status-ok" id="hud-conn-dot"></span>
          <span class="hud-label-sm">SYS</span>
        </div>
      </div>

      <div class="hud-panel hud-rec-indicator">
        <span class="hud-rec-dot"></span>
        <span class="hud-label-sm" id="hud-mission-time">00:00:00</span>
      </div>
    </div>
  </div>
</div>

<link rel="stylesheet" href="/static/css/pilot.css">
<script src="/static/js/pilot.js"></script>
<script src="/static/js/manipulator.js"></script>
{% endblock %}

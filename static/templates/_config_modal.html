<div class="modal fade" id="configModal" tabindex="-1" aria-labelledby="configModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content modal-custom">
      <div class="modal-header modal-header-custom">
        <h5 class="modal-title" id="configModalLabel">Configuration</h5>
        <button type="button" class="btn-close modal-close-btn" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body modal-body-custom">
        <div class="mb-3">
          <label for="update-interval" class="form-label">
            Update Interval (ms): <span id="interval-value">500</span>
          </label>
          <input type="range" class="form-range" id="update-interval" min="1" max="2000" step="100" value="500">
        </div>

        <hr class="border-secondary">
        <h6 class="text-light mb-3">Controller Gain</h6>

        <!-- Master Gain -->
        <div class="mb-3">
          <label for="gain-master" class="form-label">
            Master Gain: <span id="gain-master-value">1.00</span>
          </label>
          <input type="range" class="form-range" id="gain-master" min="0" max="1" step="0.01" value="1">
        </div>

        <!-- Per-axis gains -->
        <div class="mb-2">
          <label for="gain-surge" class="form-label">
            Surge: <span id="gain-surge-value">1.00</span>
          </label>
          <input type="range" class="form-range gain-axis-slider" id="gain-surge" data-axis="surge" min="0" max="1" step="0.01" value="1">
        </div>
        <div class="mb-2">
          <label for="gain-sway" class="form-label">
            Sway: <span id="gain-sway-value">1.00</span>
          </label>
          <input type="range" class="form-range gain-axis-slider" id="gain-sway" data-axis="sway" min="0" max="1" step="0.01" value="1">
        </div>
        <div class="mb-2">
          <label for="gain-heave" class="form-label">
            Heave: <span id="gain-heave-value">1.00</span>
          </label>
          <input type="range" class="form-range gain-axis-slider" id="gain-heave" data-axis="heave" min="0" max="1" step="0.01" value="1">
        </div>
        <div class="mb-2">
          <label for="gain-roll" class="form-label">
            Roll: <span id="gain-roll-value">1.00</span>
          </label>
          <input type="range" class="form-range gain-axis-slider" id="gain-roll" data-axis="roll" min="0" max="1" step="0.01" value="1">
        </div>
        <div class="mb-2">
          <label for="gain-pitch" class="form-label">
            Pitch: <span id="gain-pitch-value">1.00</span>
          </label>
          <input type="range" class="form-range gain-axis-slider" id="gain-pitch" data-axis="pitch" min="0" max="1" step="0.01" value="1">
        </div>
        <div class="mb-2">
          <label for="gain-yaw" class="form-label">
            Yaw: <span id="gain-yaw-value">1.00</span>
          </label>
          <input type="range" class="form-range gain-axis-slider" id="gain-yaw" data-axis="yaw" min="0" max="1" step="0.01" value="1">
        </div>

        <hr class="border-secondary">
        <h6 class="text-light mb-2">Controller Mapping</h6>
        <p class="text-muted small mb-2">
          Input index per action — SDL (game-controller mapping) and Raw (plain joystick).
          Use <em>Bind</em> to capture an input, or edit the numbers directly.
        </p>
        <div class="row g-1 small text-light-muted mb-1">
          <div class="col-4">Action</div>
          <div class="col-auto" style="width:72px">SDL</div>
          <div class="col-auto" style="width:72px">Raw</div>
          <div class="col-auto" style="width:48px">Inv</div>
          <div class="col-auto">Bind</div>
        </div>
        <div id="mapping-container"></div>
        <div class="d-flex align-items-center gap-2 mt-2">
          <button type="button" id="mapping-save" class="btn btn-sm btn-success">Save Mapping</button>
          <button type="button" id="mapping-reset" class="btn btn-sm btn-outline-warning">Reset</button>
          <span id="mapping-status" class="small text-muted ms-auto"></span>
        </div>
      </div>
      <div class="modal-footer modal-footer-custom">
         <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
